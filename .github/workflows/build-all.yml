name: Build all

permissions:
  contents: read
  actions: write # to upload artifacts

on:
  workflow_dispatch:
    inputs:
      branch:
        description: PDFium branch
        required: false
        default: main
      version:
        description: PDFium version
        required: false
        default: ""
      is_debug:
        description: Is debug
        type: boolean
        required: false
        default: false
      release:
        description: Publish GitHub release
        type: boolean
        required: false
        default: false

jobs:
  android_arm:
    name: Android ARM
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: android
      target_cpu: arm
      build_type: static

  android_arm64:
    name: Android ARM64
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: android
      target_cpu: arm64
      build_type: static

  android_x64:
    name: Android x64
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: android
      target_cpu: x64
      build_type: static

  android_x86:
    name: Android x86
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: android
      target_cpu: x86
      build_type: static

  ios_catalyst_arm64:
    name: iOS catalyst ARM64
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: ios
      target_cpu: arm64
      target_environment: catalyst
      build_type: static

  ios_catalyst_x64:
    name: iOS catalyst x64
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: ios
      target_cpu: x64
      target_environment: catalyst
      build_type: static

  ios_device_arm64:
    name: iOS device ARM64
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: ios
      target_cpu: arm64
      target_environment: device
      build_type: static

  ios_simulator_arm64:
    name: iOS simulator ARM64
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: ios
      target_cpu: arm64
      target_environment: simulator
      build_type: static

  ios_simulator_x64:
    name: iOS simulator x64
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: ios
      target_cpu: x64
      target_environment: simulator
      build_type: static

  linux_arm:
    name: Linux ARM
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: linux
      target_cpu: arm
      build_type: static

  linux_arm64:
    name: Linux ARM64
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: linux
      target_cpu: arm64
      build_type: static

  linux_ppc64:
    name: Linux ppc64
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: linux
      target_cpu: ppc64
      build_type: static

  linux_x64:
    name: Linux x64
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: linux
      target_cpu: x64
      build_type: static

  linux_x86:
    name: Linux x86
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: linux
      target_cpu: x86
      build_type: static

  linux_musl_arm64:
    name: Linux musl ARM64
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: linux
      target_cpu: arm64
      target_environment: musl
      build_type: static

  linux_musl_x64:
    name: Linux musl x64
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: linux
      target_cpu: x64
      target_environment: musl
      build_type: static

  linux_musl_x86:
    name: Linux musl x86
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: linux
      target_cpu: x86
      target_environment: musl
      build_type: static

  mac_arm64:
    name: macOS ARM64
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: mac
      target_cpu: arm64
      build_type: static

  mac_x64:
    name: macOS x64
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: mac
      target_cpu: x64
      build_type: static

  win_arm64:
    name: Windows ARM64
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: win
      target_cpu: arm64
      build_type: static

  win_x64:
    name: Windows x64
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: win
      target_cpu: x64
      build_type: static

  win_x86:
    name: Windows x86
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      version: ${{ github.event.inputs.version }}
      is_debug: ${{ github.event.inputs.is_debug == 'true' }}
      target_os: win
      target_cpu: x86
      build_type: static

  publish:
    name: Publish Release
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      tagname: ${{ github.event.inputs.branch }}
    if: startsWith(github.event.inputs.branch, 'chromium/') && github.event.inputs.version && github.event.inputs.release == 'true'
    runs-on: ubuntu-latest
    needs:
      - android_arm
      - android_arm64
      - android_x64
      - android_x86
      - ios_device_arm64
      - ios_simulator_x64
      - linux_arm
      - linux_arm64
      - linux_musl_arm64
      - linux_musl_x64
      - linux_musl_x86
      - linux_ppc64
      - linux_x64
      - linux_x86
      - mac_arm64
      - mac_x64
      - win_arm64
      - win_x64
      - win_x86
    permissions:
      contents: write # to create releases
      id-token: write # to attest build provenance
      attestations: write # to attest build provenance
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
      - name: Create tarballs
        run: |
          for DIR in pdfium-*; do
            echo "::group::$DIR"
            (cd $DIR; tar czf ../$DIR.tgz *)
            echo "::endgroup::"
          done
      - name: Write release body
        run: echo "This version was built with branch \`$BRANCH\` of PDFium" > RELEASE.md
        env:
          BRANCH: ${{ github.event.inputs.branch }}
      - name: Get changes
        continue-on-error: true
        run: |
          CURRENT_REV=$BRANCH
          PREVIOUS_REV=$(curl --silent "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r ".tag_name")
          git clone -b "$BRANCH" https://pdfium.googlesource.com/pdfium.git
          cat <<END >> RELEASE.md
          ### Changes
          Commits between \`$PREVIOUS_REV\` and \`$CURRENT_REV\`:
          END
          git -C "pdfium" log origin/${PREVIOUS_REV}.. --pretty=format:'* [%s](https://pdfium.googlesource.com/pdfium/+/%H)' >> RELEASE.md
        env:
          BRANCH: ${{ github.event.inputs.branch }}
      - name: Generate artifacts checksums
        id: hash
        run: echo "hashes=$(sha256sum pdfium-*.tgz | base64 -w0)" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance
        id: provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: pdfium-*.tgz
      - name: Rename provenance file
        run: mv "${{ steps.provenance.outputs.bundle-path }}" pdfium-attestation.json
      - name: Publish Release
        uses: ncipollo/release-action@v1
        with:
          immutableCreate: true
          bodyFile: RELEASE.md
          token: ${{ secrets.GITHUB_TOKEN }}
          name: PDFium ${{ github.event.inputs.version }}
          tag: ${{ github.event.inputs.branch }}
          artifacts: pdfium-*.tgz, pdfium-attestation.json
